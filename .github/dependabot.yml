version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      entity-framework-core:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
      roslyn:
        patterns:
          - "Microsoft.CodeAnalysis*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
