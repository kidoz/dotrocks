name: Integration

on:
  pull_request:
  push:
    branches:
      - main
  # Reusable entry point so release.yml can gate publishing on this matrix.
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

# Scope the group by event so a release-triggered (workflow_call) run never shares a
# group with pull_request/push runs, and only those fast-feedback runs are cancellable.
concurrency:
  group: integration-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

jobs:
  starrocks:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        starrocks-version: ["3.5.5", "4.0.7"]

    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_DO_NOT_USE_MSBUILD_SERVER: 1
      DOTROCKS_RUN_INTEGRATION: 1
      DOTROCKS_HOST: 127.0.0.1
      DOTROCKS_PORT: 9030
      DOTROCKS_FE_HTTP_PORT: 8030
      STARROCKS_VERSION: ${{ matrix.starrocks-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Restore packages
        run: dotnet restore DotRocks.slnx --locked-mode

      - name: Build
        run: dotnet build DotRocks.slnx --configuration Release --no-restore

      - name: Start StarRocks
        run: docker compose -f dev/docker-compose.yml up -d

      - name: Wait for StarRocks
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..120}; do
            if docker compose -f dev/docker-compose.yml exec -T starrocks \
              mysql -h127.0.0.1 -P9030 -uroot -e 'SELECT 1' >/dev/null 2>&1; then
              break
            fi
            if [ "${attempt}" = "120" ]; then
              docker compose -f dev/docker-compose.yml logs --tail=200 starrocks >&2 || true
              exit 1
            fi
            sleep 5
          done

          # The FE answers SELECT 1 before any BE is alive; table operations fail until a
          # backend registers. Probe with a real CREATE TABLE so tests never start early.
          for attempt in {1..120}; do
            if docker compose -f dev/docker-compose.yml exec -T starrocks \
              mysql -h127.0.0.1 -P9030 -uroot -e \
              'CREATE DATABASE IF NOT EXISTS dotrocks_readiness; CREATE TABLE IF NOT EXISTS dotrocks_readiness.probe (id INT) PROPERTIES ("replication_num" = "1"); DROP DATABASE dotrocks_readiness' \
              >/dev/null 2>&1; then
              break
            fi
            if [ "${attempt}" = "120" ]; then
              docker compose -f dev/docker-compose.yml logs --tail=200 starrocks >&2 || true
              exit 1
            fi
            sleep 5
          done

          for attempt in {1..120}; do
            if curl -fsS -o /dev/null "http://127.0.0.1:${DOTROCKS_FE_HTTP_PORT}/api/health" 2>/dev/null \
              || curl -fsS -o /dev/null "http://127.0.0.1:${DOTROCKS_FE_HTTP_PORT}/" 2>/dev/null; then
              exit 0
            fi
            if [ "${attempt}" = "120" ]; then
              docker compose -f dev/docker-compose.yml logs --tail=200 starrocks >&2 || true
              exit 1
            fi
            sleep 5
          done

      - name: Run ADO.NET integration tests
        run: dotnet test tests/DotRocks.Data.IntegrationTests --configuration Release --no-build

      - name: Run Dapper integration tests
        run: dotnet test tests/DotRocks.Data.DapperTests --configuration Release --no-build

      - name: Run EF Core integration tests
        run: dotnet test tests/DotRocks.EntityFrameworkCore.IntegrationTests --configuration Release --no-build

      - name: Collect StarRocks logs
        if: always()
        run: |
          mkdir -p artifacts/integration
          docker compose -f dev/docker-compose.yml logs --no-color > artifacts/integration/starrocks.log || true

      - name: Upload StarRocks logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: starrocks-logs-${{ matrix.starrocks-version }}
          path: artifacts/integration/starrocks.log
          if-no-files-found: warn

      - name: Stop StarRocks
        if: always()
        run: docker compose -f dev/docker-compose.yml down -v
