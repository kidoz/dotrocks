name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  nuget:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: nuget

    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_DO_NOT_USE_MSBUILD_SERVER: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore packages
        run: dotnet restore DotRocks.slnx --locked-mode

      - name: Resolve package version from release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            version="${GITHUB_REF_NAME#v}"
            if [ -z "${version}" ]; then
              echo "Release tag '${GITHUB_REF_NAME}' did not yield a version." >&2
              exit 1
            fi
          else
            version="0.0.0-manual"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Build
        run: dotnet build DotRocks.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: |
          dotnet test tests/DotRocks.Protocol.Tests --configuration Release --no-build
          dotnet test tests/DotRocks.EntityFrameworkCore.Tests --configuration Release --no-build
          dotnet test tests/DotRocks.Analyzers.Tests --configuration Release --no-build
          dotnet test tests/DotRocks.Benchmarks.Tests --configuration Release --no-build
          dotnet test tests/DotRocks.PackageTests --configuration Release --no-build

      - name: Pack
        run: dotnet pack DotRocks.slnx --configuration Release --no-build --output artifacts/packages -p:Version=${{ steps.version.outputs.version }}

      - name: Attest package provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dotrocks-release-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived nuget.org API key
      # (no long-lived NUGET_API_KEY secret). Requires id-token: write (set above) and a trusted
      # publishing policy on nuget.org for this repo + workflow + the `nuget` environment.
      - name: NuGet login (trusted publishing)
        id: nuget-login
        if: github.event_name == 'release'
        uses: NuGet/login@v1
        with:
          # The nuget.org account username (profile name), not an email address. Kept in a secret
          # so it is masked in logs, per the NuGet Trusted Publishing guidance.
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        if: github.event_name == 'release'
        shell: bash
        run: |
          set -euo pipefail
          # No --skip-duplicate: re-publishing an existing version must fail loudly rather
          # than silently shipping nothing.
          # Push only *.nupkg: dotnet nuget push automatically uploads the adjacent *.snupkg
          # symbol package, so iterating *.snupkg separately re-pushes symbols and fails with
          # a 409 conflict while the first copy is still pending validation.
          for package in artifacts/packages/*.nupkg; do
            dotnet nuget push "${package}" \
              --api-key "${NUGET_API_KEY}" \
              --source https://api.nuget.org/v3/index.json
          done
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
