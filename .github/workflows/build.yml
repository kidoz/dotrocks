name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore packages
        run: dotnet restore DotRocks.slnx --locked-mode

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Build
        run: dotnet build DotRocks.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DotRocks.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack DotRocks.slnx --configuration Release --no-build
