name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_DO_NOT_USE_MSBUILD_SERVER: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore packages
        run: dotnet restore DotRocks.slnx --locked-mode

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Build
        run: dotnet build DotRocks.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DotRocks.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack DotRocks.slnx --configuration Release --no-build --output artifacts/packages

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dotrocks-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
