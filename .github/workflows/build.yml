name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_DO_NOT_USE_MSBUILD_SERVER: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore packages
        run: dotnet restore DotRocks.slnx --locked-mode

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Build
        run: dotnet build DotRocks.slnx --configuration Release --no-restore

      # Integration suites (Data.IntegrationTests, Data.DapperTests, EntityFrameworkCore.IntegrationTests)
      # require a live StarRocks server and run in integration.yml. Run only the server-free
      # unit/protocol/analyzer/packaging suites here.
      - name: Test
        run: |
          dotnet test tests/DotRocks.Protocol.Tests --configuration Release --no-build
          dotnet test tests/DotRocks.EntityFrameworkCore.Tests --configuration Release --no-build
          dotnet test tests/DotRocks.Analyzers.Tests --configuration Release --no-build
          dotnet test tests/DotRocks.PackageTests --configuration Release --no-build
